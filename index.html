<!DOCTYPE html>
<html>
  <head>
	<title>模板</title>
	<meta http-equiv="content-type"content="text/html;charset=utf-8">
	<style>
	  body {
	    width: 100vw;
	    height: 100vh;
	  }
	  .header {
	    width: 100%;
		position: sticky;
		top: 0;
		left: 0;
		background: #ffffff;
		box-shadow: 0 10px 30px #d8d8d8;
	  }
	  @media(min-width:1080px){
	    body {
	      height: 150px;
	    }
	  }
	  @media(min-width:1200px){
	    body {
	      height: 100px;
	    }
	  }
	  .icon {
	    position: relative;
		top: 10px;
		left: 10px;
	    font-size: 80px;
		font-weight: 700;
		color: #484848;
	  }
	  .root {
	    margin: 0;
	  }
	  .title {
	    margin: 60px 15px 15px 15px;
		background: radial-gradient( at 100% -22.5%, rgba( 0, 0, 0, 0 ) 55%, gold 120% );
		border-radius: 15px;
		text-align: center;
		font-size: 5em;
		font-weight: 900;
		box-shadow: 5px 10px 50px #999999;
	  }
	  .subtitle {
	    margin: 15px 0 15px 0;
		text-align: center;
	  }
	  .subtitle .text{
	    display: inline;
	    border-radius: 10px;
		font-size: 62px;
		font-weight: bold;
		background: linear-gradient( to bottom, rgba( 0, 0, 0, 0 ), 75%, gold );
		box-shadow: 3px 5px 25px #999999;
	  }
	  .content {
	    margin: 15px 15px 15px 15px;
		font-size: 45px;
	  }
	  .attention {
	    font-weight: bold;
		color: #ee1111;
	  }
	  .hyperlink {
	    font-weight: bold;
		text-shadow: 0 0 10px #808080;
		text-decoration: none;
		animation: hld 10s linear infinite;
	  }
	  @keyframes hld {
	    0% {
		  color: #ff0000;
		}
		33% {
		  color: #00ff00;
		}
		67% {
		  color: #0000ff;
		}
		100% {
		  color: #ff0000;
		}
	  }
	  #hyperlink:hover {
	    color: #f8f8f8;
		animation: hlh 10s linear infinite;
	  }
	  @keyframes hlh {
	    0% {
		  text-shadow: 0 0 50px #ff0000;
		}
		33% {
		  text-shadow: 0 0 50px #00ff00;
		}
		67% {
		  text-shadow: 0 0 50px #0000ff;
		}
		100% {
		  text-shadow: 0 0 50px #ff0000;
		}
	  }
	</style>
	<script>
	</script>
  </head>
  <body>
	<div class="header">
	  <span class="icon">网站图标</span>
	</div>
	<div class="root">
	  <div class="title">标题</div>
	  <div class="content">
		<p>引言
		<div class="subtitle">
		  <div class="text">副标题</div>
		</div>
	    <p>正文
		<p>正文
		<p>正文
		<div style="text-align:center;margin: 100px 20px 100px 20px;">
		  <img src="/image/null.png"width="100%">
		  <span style="font-weight:300;font-size:35px;color:gray;">插图</span>
		</div>
		<div class="subtitle">
		  <div class="text">副标题</div>
		</div>
		<p style="font-weight:bold;font-size:52px;">段落标题
		<p>正文
		<p>正文
		<p>正文
		<p style="font-weight:bold;font-size:52px;">段落标题
		<p>正文
		<p>正文
		<p>正文
		<div class="subtitle">
		  <div class="text">副标题</div>
		</div>
		<p style="font-weight:bold;font-size:52px;">段落标题
		<p>正文
		<p>正文
		<p>正文
		<p>正文
		<p style="font-weight:bold;font-size:52px;">段落标题
		<p>正文
		<p>正文
		<p>正文
	  </div>
	</div>
  </body>
</html>
